name: Sprint Report

on:
  schedule:
    # Every Friday at 4:00 PM UTC — adjust timezone offset as needed
    - cron: "0 16 * * 5"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Number of days to look back (default: 7)"
        required: false
        default: "7"
      sprint_name:
        description: "Sprint name override (e.g. 'Sprint 42')"
        required: false
      sprint_goal:
        description: "Sprint goal text (optional)"
        required: false

jobs:
  generate-reports:
    name: Generate Sprint Reports
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to commit report files back to the repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run report agent
        env:
          GITHUB_TOKEN: ${{ secrets.REPORT_GITHUB_TOKEN }}
          GITHUB_REPOS: ${{ vars.GITHUB_REPOS }}
          GITHUB_MILESTONE: ${{ vars.GITHUB_MILESTONE }}
          TEAM_NAME: ${{ vars.TEAM_NAME || 'Engineering' }}
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
          SPRINT_NAME: ${{ github.event.inputs.sprint_name || '' }}
          SPRINT_GOAL: ${{ github.event.inputs.sprint_goal || '' }}
          POST_TO_SLACK: ${{ vars.POST_TO_SLACK || 'false' }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: npm start

      - name: Commit and push reports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          # Only commit if there are new report files
          if git diff --cached --quiet; then
            echo "No new reports to commit."
          else
            git commit -m "chore: add sprint reports $(date +%Y-%m-%d)"
            git push
          fi
